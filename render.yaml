services:
  - type: web
    name: recruitiq-web
    runtime: node
    plan: starter
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recruitiq-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: recruitiq-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: APP_ENCRYPTION_KEY
        generateValue: true

  - type: worker
    name: recruitiq-worker
    runtime: node
    plan: starter
    region: singapore
    autoDeployTrigger: commit
    buildCommand: npm ci
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recruitiq-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: recruitiq-db
          property: connectionString
      - key: GEMINI_API_KEY
        fromService:
          type: web
          name: recruitiq-web
          envVarKey: GEMINI_API_KEY
      - key: APP_ENCRYPTION_KEY
        fromService:
          type: web
          name: recruitiq-web
          envVarKey: APP_ENCRYPTION_KEY
      - key: APP_BASE_URL
        fromService:
          type: web
          name: recruitiq-web
          envVarKey: APP_BASE_URL

databases:
  - name: recruitiq-db
    plan: free
    databaseName: recruitiq
    postgresMajorVersion: "17"
    region: singapore
